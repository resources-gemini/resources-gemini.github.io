<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - PNG Resources</title>
    <style>
        /* Dark mode because we aren't savages like Connor */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 5px; } /* Electric Blue vibe */
        #status { color: #8b949e; margin-bottom: 30px; font-style: italic; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 10px; }
        
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        
        img { width: 100%; height: 150px; object-fit: contain; border-radius: 4px; background: #0d1117; }
        
        .filename { margin-top: 12px; font-weight: bold; font-size: 14px; color: #f0f6fc; word-break: break-all; }
        
        .copy-btn { margin-top: 10px; padding: 5px 10px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .copy-btn:active { background: #2ea043; }
    </style>
</head>
<body>

    <h1>The Vault: PNG Resources</h1>
    <div id="status">Scanning your GitHub repo...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        // JUST UPDATE THESE:
        const username = "resources-gemini"; 
        const repo = "resources-gemini.github.io";
        const folder = "png"; 

        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

        async function loadImages() {
            try {
                const response = await fetch(apiUrl);
                const files = await response.json();
                
                const gallery = document.getElementById('gallery');
                const status = document.getElementById('status');
                
                // Only grab the PNGs
                const pngFiles = files.filter(f => f.name.toLowerCase().endsWith('.png'));
                
                status.innerText = `Total PNGs Found: ${pngFiles.length}`;

                pngFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // file.name is the actual name of the file in the folder
                    card.innerHTML = `
                        <img src="${file.download_url}" alt="${file.name}">
                        <div class="filename">${file.name}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${file.download_url}')">Copy Link</button>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                status.innerText = "Error: Check your repo name or folder path.";
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Link copied to clipboard, bro!");
        }

        loadImages();
    </script>
</body>
</html>
